body:
  text: 卷三莊周畫頌莊周畫頌玉潔蒙縣蘭薰漆園丹青可久雅道斯存夢中化蝶水外翔鯤出俗靈府師心妙門垂竿自若重聘忘言悠哉天地共是籠樊藝文類聚三十六香贊香贊海岸相傳香流大千不吹自轉將銷更燃縈空雜霧散迥飛煙還符戒品熏修福田花贊池中寶花葉覆金沙逆風氣亂映水光斜散由天女賣乃王家若生心樹願結因牙燈贊寶燈夜開影徧花臺烟抽細燄燼落輕灰珠慚色竝月恥光來一明暗室若遣塵埃幡贊金幡化成搖蕩相明留無定影散乃俱輕光分紺殿采布香城恆知自轉福與之生藝文類聚七十六芳林園天淵池銘歲次執徐月維大呂爰命梓匠廣修畚鍤摽置舊趾開浚昔基東西彌望雲霧之所澄蕩南北紆縈虹霓之所引曜曉川漾璧似日御之在河宿夜浪浮金疑月輪之馳水府前瞰萬雉列榭參差卻拒三襲危巒聳峭瓌鳥異禽自學歌舞神木靈卉不知搖落但叔皮覽海序螭蛟之泛濫吉甫臨舟美檉松之蓊茸尚復著在吟詠緘彼緹緗況我君門盛事未紀謬頒待詔謹製銘云石溝溜密蘭渚潮平九華閣道百丈層盈液搖殿色殿寫波明藝文類聚九永陽王齋後山亭銘叢臺造日淄館連雲錦牆列繢繡地成文吾王卓爾逸趣不群梅梁蕙閣桂棟蘭枌竹深蓋雨石暗迎曛激流疑疏搆峰似削苔滑危磴藤攀聳萼樹影搖窗池光動幕月澄遙漵風清近壑雪岸難消花園易落高桐百尺垂楊五株開榮九畹結秀三珠山條紫的水葉紅鬚抽芳繞霤接翠分衢亭讙旅鶴浦噪驚鳧前列牧馬後招郇伯諷誦楚詩精微沛易叢桂留賞散金匪惜不羨睢陽還蚩碣石馳聲終古服義無斁藝文類聚六十四玄圃石室銘僊巖石㯓僊宇石牆地云正域道示修羊紫烟碧露絳雪玄霜廣成不踐王烈未翔移華甲觀徙構震方遠跨飛梁俛臨倒景瓊蕊珠樹金階玉井映日分暉搖風共影岫濃翠合林虛桂靜朔去偷桃董來貨杏檐非刻削戶恣登臨迎春花近避暑涼深秋雲卷闇冬霰停陰桐棲鳳采竹化龍吟輕飛亂色激溜成音天縱儲睿生知作兩弦誦餘隙仁智為賞河曲停遊洛濱息往祥梨吐秀瑞燕流響一物或鐫萬國斯仰蓺文類聚六十五方鏡銘并序此鏡以照著衣鏡背圖刻八卦二十八宿仁壽殿前無以加斯彫麗也玄枵命巧仲呂呈祥金鐫石漢銅鑄丹陽價珍負局影麗高堂圖星擬蓋寫卦隨方明齊水止照與天長增輝兔苑永侍龍光藝文類聚七十懷安寺剎下銘懷安寺剎下銘四聰睿后萬行了因運光玉鏡道茂金輪爰構靈剎地迹重闉迎風雲表承露天津飛甍巀嶭累棟嶙峋護持七眾警衛百神籌銷草木劫盡沙塵支提永固福業恆新變易東海長久北辰藝文類聚七十鐘銘鳧氏之匠狃陽之銅圖欒鑄鑮刻獸鐫蟲聲飛雪裏韻切脣中遙符玉律遠雜金風朝驚鷲嶺夜動龍宮冀憑慧業冥感神功百非洗蕩萬善招通長如五淨永證三空藝文類聚七十又鐘銘篆閒鎔刻欒上雕鐫聲齊法鼓響逸鳴楗舟移巨壑火壞初禪藝文類聚七十優填像銘如花譬象若火疑龍毫光此遇法相今逢眸雲齒雪月貌金容大仙下降避席為恭藝文類聚七十七梁故度支尚書陸君誄梁故度支尚書陸君誄君諱襄字師卿吳人也祖惠徹宋車騎府法曹行參軍父閑揚州別駕齊永元紹厤蕭遙光謀反伏誅閑以州職見害子絳其日并命忠孝之道萃此一門襄時年十四號毀殆滅布衣蔬食終于身世起家著作佐郎出為永寍縣令累遷臨川王廬陵王法曹外兵記室入為太子洗馬掌管記中書舍人管記如故為丹陽尹丞俄遷太子庶子掌管記揚州治中太子家令領國子博士管記如故丁母顧夫人憂廬乎墓所服闋又從家令轉中庶子竝掌管記遷中散大夫金華宮家令出為鄱陽內史除尚書吏部郎祕書監領揚州大中正度支尚書太清二年三月京師傾覆君竄迹還鄉吳民陸黯起義民攻郡擾攘之際憂憤而終春秋七十有二余避世河滸暫之吳國百舍不容千里無饋陸公國士之眷惠好之深朝同飦粥夕共瓢飲契闊晤言流連晦朔日月逝矣懷古何忘臨哀能誄久願搖筆時事屯邅不遑削藁梁季適越未戢干戈陳世入仕累牽物役杼軸于懷四十餘載隋開皇九年于長安致仕懸車已洎就木幾何但東海成田南冠永縶龜山更促空想吹笛之哀馬角徒生絕望通波之水嗚呼哀哉攬涕操觚乃為誄曰媯苗碩茂完裔繁昌賓門穆穆筮仕鏘鏘食采命氏遐哉陸鄉四昇臺省八辟賢良分柯振葉令聞令望玄蕤朱鞸翠弁金鐺流聲世祀列讚祠堂別駕貞烈志存名教捐生徇主知死不撓暉映泉壤痛此忠孝於鑠夫子積德累仁韜光戢耀隱璞含真居哀能痛至情通神淚枯壟樹哀感馴禽永慟家禍長號不辰玄黃絕睇蔬布終身心符屈婞室等原貧分甘共感內族外姻求之今古斯為異人月下奏章螢前讀史給紙蘭臺觀書洛市強學待問潤身為己結髮濯纓登朝入仕昂昂逸驥逐日千里宛宛長離陵江迅起枳棘棲鳳化行乳雉平臺累陟石扇蹔履跧伏不競棼絲自理倚席無譏師訓冑子驥足時務俊民斯俟秋實選能春華備美思媚儲后遊息承華書記策擢爵命增加彈碁擊筑沈李浮瓜追隨飛蓋侍從鳴笳二儀迴幹四氣淹賒離景遽沈前星奄滅撫己惟舊懷恩守節昔荷故臣攀號聲折登高能賦大夫就列金華式肈更奉清切脩竹貞松含霜抱雪下車軒日求瘼康時良辰坐嘯朗夜臥治懸魚化靜佩犢去思廣弘條教精察毫釐典選搜揚操刀密勿不紊朱紫傍無請謁祕署學林得人超忽延閣緗素校文遺闕上妙鉛槧譽成碁月雁行攸序龍作𥳑才讓珠不拜賜劍恩來帝曰俞往爾行兼該金城失險玉弩流災年臻几杖病息草萊世故天禍臣悲主辱露盡朝陽風驚夜燭黃鵠超遙白駒何促事迫歸魂依然啟足悠悠世路辛苦艱虞尋戈滿道暴骨交衢家無半菽地絕飛芻念君桑梓零落凋枯傷君井邑孑盭崎嶇喪亂絕卜葵藿荒蕪淒涼故友擗摽遺孤臨穴外野撫櫬窮途嗚呼哀哉為善豈懼修名難假德履中和道周文雅不朽之迹非謂泉下亹亹清名泠泠獨寫嗚呼哀哉文苑英華八百四十二又略見藝文類聚四十八陳宣帝哀策文望蜃綍而攀摽拜龍菆而慟絕變五統而淒涼迴三辰而慘切感川岳而地維傾號穹蒼而天柱折千秋茂德萬世鴻名爰詔掌禮式序英聲其辭曰媯水樞宿姚墟大虹謳歌承曆揖讓受終重規帝緒踵武王風名山紀迹清廟傳功我后丕承思弘祖業莅政恭己臨朝凝默煥爛九功葳蕤七德憲章昭著威靈允塞爰茲發迹天步艱難連華滕衛比譽應韓羽儀戚右軒冕朝端祈膺當璧繇顯大橫延喜授玉告善飛旌神器有奉性道無名詩頌唐年樂舞姬日仁聲汪濊武義洋溢理訟總街凝情衢室巡望如禮幽祇咸秩疆垂叛換關徼虔劉治兵丹浦獲醜青丘屠釣且拔管庫方搜如龍駕鼓獻雉焚裘天必呈祥地寍愛寶神禽奇獸嘉穀靈草屈軼抽階飛黃伏皁綺雲舒慶珠星照老廣敷丘素弘啟膠庠書林吐馥文囿含鏘南洽侯衛北畼遐荒殷羅自解周圄無傷金英掩色玉床弗豫天駟摧鑣王良失御鑄鼎奚益綴衣何處漫漫幽夜冥冥上仙長違拜日天意祈年寍神卜兆晏駕迴天銅驎感泣銀海埋田出德陽之廣殿動繁笳之哀囀渡洛水之浮橋望偃師之近縣背紫陌而未遠隱黃山而不見鐸啟挽而依依馬嘶風而戀戀平原欲晦落照將垂鳳蓋飄而水暗鸞蹕聳而山危曳虵旗之舒卷閒翠野之參差鳥哀哀而驚曙松瑟瑟而吟枝異故鄉之絲竹非舊宅之塤篪埽秋葉而無盡薦春櫻而願知北邙已謝西陵何有遠宿蒼梧便乖仁壽聲合韶濩道宣戶牖共瀛海而恆流竝嵩華而莫朽藝文類聚十四廣州刺史歐陽頠墓誌公家習尚書少府孺高于漢冊世居渤海太守文重乎晉原中原喪亂避地南徙公孝敬純深友悌敦睦家積遺財竝讓諸季兼賙同壤公含章內映遠識沈通窒嗜欲謹言行資貞幹事廉隅梁室不造凶羯憑陵公被銳執兇有志匡復梁孝元帝授散騎常侍東衡州刺史始興縣侯而犬戎弒逆宗社播遷陳纂揖讓攸歸高祖恩加惟舊授使持節都督南衡二十二州諸軍事廣州刺史進為開府儀同三司山陽郡公進號征南將軍加鼓吹一部巫山遠曲喧騎吹于日南芳樹清音肅軍容于海截追贈車騎將軍司空公涉獵六經優游百氏寬徭省賦化百越之歸心撫寒投醪感三軍之死力在室如賓寍慚屋漏不貪為寶每畏人知殺青無兼兩之疑薏苡豈懷珠之謗如羊如粟不改夷齊之心遺慶遺風方留豹產之德藝文類聚五十故侍中沈欽墓誌故侍中沈欽墓誌早結南陽之親致興沛市之役四埏多難三江屢梗君敦淳化以勵澆風庶滌清流以蕩濁俗早遘紫雲萍濡碧海奮里閈之寵躍車馬之貴哂竇氏之青山恥郭家之金穴藝文類聚四十八特進光祿大夫徐陵墓誌銘特進光祿大夫徐陵墓誌銘耕耘書圃弋獵文場藻思綺合尺牘繡揚辭奔太史筆利干將心緘武庫口定雌黃奉使巡採絕域遐深市朝遷貿陵谷相侵形寄王績名宣攀附高排閶闔鬱轉雲路年踰致仕齒及懸車夜漏方盡馳光復斜平原出宿庠序為家隴愁宿霧松悲閒鳥地迥雲低山重樹小九原孤月三泉送旐疇曩行役共上河梁余因病免君事遠將痛心期之徂謝憫時代之銷亡冀鐫石于玄冡留清風于故鄉藝文類聚四十七司農陳暄墓誌銘司農陳暄墓誌銘其文骫其筆縱橫背碑即誦據馬俄成誹諧見賞調笑忘情兩宮寵宦四主恩榮萬事依息一朝追送疇昔命觴文可吟諷今日酹酒長悲且慟藝文類聚四十九侍中中領軍魯廣達墓銘侍中中領軍魯廣達墓銘災流淮海險失金湯時屯運極代革天亡爪牙背義介冑無良獨標忠勇率禦有方誠貫皎日氣勵嚴霜懷恩感報撫事何忘陳書魯廣達傳皇太子太學講碑我大陳之御天下也若水渙其長瀾瑤星踵其永厤重華誕宥興于大鹿之野敬仲繼業盛矣鳴鳳之占兼以鴻才海富逸思泉瀉含毫落紙動八闋之歌謠隻句片言諧五聲之節奏雲飛風起追壓漢帝之辭高觀華池遠跨魏皇之什爰復建藏書之冊開獻書之路帷帳叢殘冡壁遺逸紫臺祕典綠帙奇文羽陵蠹迹嵩山落𥳑外史所掌廣內所司靡不飾以鉛槧彫以緗素此文教之脩也藝文類聚五十五初學記二十一吳興郡廬陵王德政碑卓爾吾王天人可擬早成夙智謙懷虛己偃息流略翱翔文史三雍雅對九師名理好古如斯學兼之矣睢陽肈構碣石初開賜田待士牓道求材剖符彭國述職琅臺去謠曙鼓留歌暮來藝文類聚五十二明慶寺尚禪師碑明慶寺尚禪師碑百世之上百世之下含章隱璞明真照假空行已無希音和寡不有耆德誰其繼者朗月靈懸高風獨寫藝文類聚七十六建初寺瓊法師碑夫智慧精進皆曰第一妙德淨名竝稱不二若乃斡五欲之泥解六情之網禦寶車之迹面香城之路荷持像法汲引人倫惟此法師心力備矣東山北山之部貫花散花之句竝編柳成𥳑題蒲就業學非全朔無待冬書師夢尹儒自知秋駕銘曰屑屑人世茫茫大千欲流心火意樹身田老驚靈籥孔惜逝川三空莫辯二諦何詮佛日初照慈雲不偏秋露寂滅莫繫悠然藝文類聚七十六攝山棲霞寺碑蓋聞天有神宮地云靈府桑欽博記始敘四衢之塔金朔著經因知千步之寺至如峰形甑累岫勢堂密亦烏足言哉南徐州琅邪郡江乘縣界有攝山者其狀似繖亦名繖山尹先生記曰山多草藥可以攝養故以攝為名焉南瞻舊落顧悌鎮戍之塢北望荒村扈謙卜筮之宅此山西南隅有外道館地俄而疫癘磨滅三清遺法未明五怖之災萬善開宗遂變四禪之境倏見齊居士平原明僧紹空解淵深至理高玅遺榮軒冕遁迹巖穴宋泰始中嘗遊此山仍有終焉之志村民野老競來諫曰山多狼虎毒虵所以久絕行踐僧紹曰毒中之毒無過三毒忠信可蹈水火猛獸亦何能為乃刊木駕峰薙草開徑披拂蓁梗結構茅茨廿許年不事人世渡河息暴擾篋無立皆曰誠至所感有法度禪師家本黃龍來遊白社梵行殫苦法性純備與僧紹冥契甚善嘗于山舍講無量壽經中夜忽見金光照室光中如有臺館形像豈知一念之閒人王照其香蓋八未曾有淵石朗其夜室居士遂捨本宅欲成此寺即齊永明七年正月三日度上人之所搆也山情率易野製疏朴崖檐峻絕㵎戶幽深卉木滋榮四時助其雕綺煙霞舒卷五色成其藻絢居士嘗夢此巖有如來光彩又因閒居依稀目見昔寶海梵志睡覩花臺智猛比丘行逢影窟故知神應非遠靈相斯在居士有懷創造俄而物故其第二子仲璋為臨沂令克荷先業莊嚴龕像首于西峰石壁與度禪師鐫造無量壽佛坐身三丈一尺五寸通座四丈并二菩薩倚高三丈三寸若乃圖寫瓌奇刻削宏壯蓮花瑩目石境沈暉藕絲縈髮雲崖失彩項日流影東方韜其大明面月馳光西照匿其成魄大同二年龕頂放光光色身相晃若炎山林閒樹下赩如火殿禪師自識終期欣瞻瑞應以建武四年于此寺順寂豈非六和精進十念允諧向沐寶池方登金地者也齊文惠太子豫章文獻王竟陵文宣始安王等慧心開發信力明悟各捨泉貝共成福業宋太宰江夏王霍姬蕃閨內德齊雍州刺史田奐方牧貴臣深曉正見玅識來果竝于此巖阿廣收財施琢磨巨石影擬法身梁太尉臨川靖慧王道契真如心弘檀密見此山製置疏闊功用稀少以天監十年八月爰撤帑藏復加瑩飾繢以丹青鏤之銑璗五分照發千輪啟煥排天堂廡玉露分色接岫軒墀翠微抽影八定之侶步纖草而揚梵三慧之僧挹飛泉而動色喜園凝靜豈傲吏之凡遊深谷虛玄非愚公之俗路是以王公搢紳之輩郎吏胥史之屬步林壑陟皋壤升精舍拜道場無不洗滌無明澣濯囂暗非直心之砥路孰能如斯者乎慧振法師志業該練心力精確度上人將就遷神深相付囑法師聿修厥緒勸助眾功基業田園多所創置先有名德僧朗法師者去鄉遼水問道京華清規挺出碩學精詣早成波若之性夙植尸羅之本闡方等之指歸弘中道之宗致北山之北南山之南不遊皇都將涉三紀梁武皇帝能行四等善悟三空以法師累降徵書確乎不拔天監十一年帝乃遣中寺釋僧懷靈根寺釋慧令等十僧詣山諮受三論大義賈誼曰學聖道如日之明孫卿云登高山知天之峻今之探賾其此之謂南蘭陵蕭𥌃幽棲抗志獨法絕群遁世茲山多歷年所臨終遺言葬法師墓側還符田豫託西門之冡更似梁鴻偶要離之瘞又案神錄云楚靳神在今臨沂縣齊永明初神詣法度道人受戒自通曰靳尚即楚大夫之靈也大同元年二月五日神又見形著菩薩巾披袈裟閑雅甚都來入禪堂請寺眾說法崑嶺之中百神所在首陽之路八駟竝驅未有修淨戒之品詣得道之僧整忍辱之衣入安禪之室是知名山大澤靈異憑依者矣慧布法師幼落煩惱早出塵勞律儀明白貞節峻遠貫綜三乘不自媒衒楷模七眾無所詆訶曩日靜憩鍾巖余便觀止湌仁飲德十有餘年頃于攝阜受持珠戒佩服之敬雖敢怠于斯須汲引之勞且曷伸于報效夫言意難盡鉛槧易凋固比河山莫如金石凡諸徵應并預隨喜竝勒于碑左乃為頌曰漫漫心火冥冥世流論生若寄喻死如休三明未了十智難周盡纏癡愛豈離瘡疣敬仰鷄足恭聞鷲頭斯風可羨其路何由我開梵宇面壑臨丘我圖靈迹果植因修兼金畫繪泐石彫鎪連雲出沒泄雨沈浮經行松磴禪坐蕙樓㵎風長瀉崖溜懸抽花臺似雪夏室疑秋名僧宴息勝侶薰修三乘謂筏六度為舟金幢合蓋寶駕驅輈地祇來格天眾追遊五時無爽七處相侔辭題翠琰字勒銀鉤賢乎樂餌過客宜留大莊嚴寺碑蓋聞僧伽水濱波斯創以禪地醍醐山頂舍𨙻肈其梵域此乃往劫之勝因上方之妙範于是俯察地勢懸之以水仰惟皇極揆之以日百堵咸作千坊洞啟前望則紅塵四合見三市之盈虛後睇則紫閣九重連雙闕之聳峭加以園習歡喜水成功德池溢甘露不因玉掌樹搖音樂無待金奏薰鑪夜爇遙來海岸之香法鼓晨讙非動泗濱之石擢莖金表跨八萬之俱成界道銀繩面四衢而拓製廁璧綴珠凌丹霞而結宇雕光鏤采望紫極而開軒俯看驚電影徹琉璃之道遙拖宛虹光徧水精之域層楹刻桷風伯走而未升靈橑飛甍雨師攀而不逮銘曰灼爍金莖崔嵬銀表翔鶤仰翥威鳳靈矯木密聯綿香泥繚繞日圖檐外荷披棟杪翠落陰虬珠填陽鳥高僧累萃碩學茲多弘宣方等博綜圍陁皆傷寸晷竝悟尺波式旌鏤碣無待雕戈標年剎土比數洹河藝文類聚七十七群臣請贖武帝懺文捨身群臣請贖武帝懺文捨身某位某甲稽首和南十方三世一切諸佛十方三世一切尊法十方三世一切賢聖見前大德僧皇帝某菩薩睿哲聰明廣淵齊聖心若虛空照窮般若發弘大誓荷負眾生神道會昌膺茲景業百王既季運屬艱難五嶽維塵六軍日動劬勞在念有切皇心既而深悟苦空極言無我寶臺華柱本非實錄賊城樓櫓苦具茲多遂坐道場靜居禪室堅固善本具足檀那石壁山河珍車寶馬頭目髓腦妻子國城鑾輅龍章翠帳玉几福德所感威惠所及莫不肅然大捨供養三尊便欲拂衣崆峒高步六合到林閒而宴坐與釋眾而同遊紫微虛宮黃屋曠位上靈聳動厚土怔惶弟子等身纏愛惑業構煩惱天生烝民樹以司牧惵惵黔首非后罔戴豈容尊居萬乘而伸獨往之情應在帝王而為布衣之事且蠻夷猾夏寇賊姦宄燧人警職日照甘泉之火四郊多壘未肆樓船之威若使七聖遂迷窅然汾水之上八駿沃若方在瑤池之濱則天下何依群臣莫奉宗社廟堂有廢彝則弟子不勝狼狽之切謹捨如干錢如干物仰嚫三寶大眾奉贖皇帝及諸王所捨悉還本位伏願十方三寶見前大德僧以慈悲力用無礙心坐道放光顯揚宣說歡喜和合超然降許當使皇帝望雲望日之姿與南山等固乃神乃聖之德與北極同尊中宮后妃之星金楨玉幹之戚窮積善之慶盡萬歲之懽玉鑾迴鑣金門洞啟百辟翹首搢紳竝列願塵勞與雲沴俱銷億兆與天地同泰慊慊丹愚敢以死請弟子某和南廣弘明集二十八下
