body:
  text: 附録以下四首詩歌據逯欽立輯本頁輯録敬遜三德厥修六藝師聖發矇尊儒啓滯若括資羽如金待礪雅道聿興教學無替希代明王應期聖主裁成品物奄有區宇篇籍芬場詩書照府籠樊七十驅馭三五於赫上嗣育德元良崇賢既闢馳道飛芳儀刑震象問望離方夏戈秋籥日就月將肆禮虞庠弘風闕里降心下問勞謙讓齒五方聳聽百辟傾耳濟濟耆生莘莘胄子間歌有節合舞惟恭階陳樽篚庭列笙鏞譽宣四學業闡三雍森沉靈宇依稀神縱奠餘幣久辰良景暮黍稷非馨蘋蘩式昨崇敬台保昭彰審諭翠蓋移陰斑輪徐渡年灰迭起星琯環周春凋樹色日藻川流雪花遲舞雲葉雙抽霧開金堨冰銷石溝肅仰鴻化恭聞盛典人握懸藜家藏瑚璉顧惟朽謝暮識膚淺恩謬爵浮心慚貌㥏文館詞林百六十作隋江總上林開宴務流連太平寰宇記九十緑桷朱簾金刻鳳雕梁繡柱玉蟠螭草堂詩箋三十二秋興詩注惱殺未歸客桃花塤眼醉萬花谷七
