body:
  text: 卷二貞女峽賦倦辛苦于嶺表遂沈淪于海外迹飄颻于轉蓬情繚繞于懸旆駭茲峽之珍怪佇奇峰而矖矚或邐迤而四成乍㠑嵬而五曲含照曜之燭銀滴潺湲之膏玉山蒼蒼以墜葉樹索索而搖枝澄碧源之見底聳翠壁以臨危藝文類聚六修心賦并序大清四年秋七月避地于會稽龍華寺此伽藍者余六世祖宋尚書右僕射州陵侯元嘉二十四年之所搆也侯之王父晉護軍將軍虨昔涖此邦卜居山陰都陽里貽厥子孫有終焉之志寺域則宅之舊基左江右湖面山背壑東西陵跨南北紆縈聊與苦節名僧同銷日月曉修經戒夕覽圖書寢處風雲憑棲水月不意華戎莫辦朝市傾淪以此傷情情可知矣啜泣濡翰豈攄鬱結庶後生君子憫余此概焉嘉南斗之分次肇東越之靈祕表檜風于韓什著鎮山于周紀蘊大禹之金書鐫暴秦之石字太史來而探穴鍾離去而開笥信竹箭之為珍何碔砆之罕值奉盛德之鴻祀寓安禪之古寺實豫章之舊圃成黃金之勝地遂寂默之幽心若鏡心而遠尋面曾阜之超忽邇平湖之迥深山條偃蹇水葉浸淫挂猿朝落飢鼯夜吟果叢藥苑桃蹊橘林梢雲拂日結暗生陰保自然之雅趣鄙人閒之荒雜望島嶼之邅回面江源之重沓泛流月之夜迥曳光煙之曉匝風引蜩而嘶噪雨鳴林而翛颯烏稍狎而知來雲無情而自合邇乃野開靈塔地築禪居喜園迢遰樂樹扶疏經行藉草宴坐臨渠持戒振錫庇影甘蔬堅固之林可喻寂滅之場暫如異曲終而悲起非木落而愁始豈降志而辱身不露才而揚己鍾風雨之掩藹倦雞鳴之聒耳幸避地而高棲憑調御之遺旨折四辨之微言悟三乘之妙理遣十纏之繫縛袪五惑之塵滓久遺榮于勢利庶忘纍于妻子感意氣于疇日寄知音于來祀何遠客之可悲私自憐其何已陳書江總傳文苑英華九十七勞酒賦在陽春之仲序覽具物之芳菲帥公卿而播百穀親耒耜而命三推開青壇于迥甸列翠幕于清沂乃遵執爵之典爰降食蘋之宴豁朱鳥之高窗啓黃龍之抗殿奏帝鴻之萬舞動鈞天之九變顧曲私之亭育遞寒暑而徂遷謬陳力而策駘豈酬恩于暮年藝文類聚三十九辭行李賦惟大梁三十有六載神功懋乎開闢垂恩儲祉壓子代之盤盂盛德形容陋周年之弇石月窟向風日域仰澤要荒款塞諸戎重譯輶軒巡履聲芳亥步旌節經過事高禹迹舉皇華之盡美馳玨玉之多事或江夏之無雙匹洛陽之才子訪羽儀于廊廟旌秀異于杞梓引強學之三端賞雕文于四始顧傯侗于罕志奉朝章于信次忝鳳舉而張旃濟龍沙而通賮敏異季札之聽歌譽乖屬國之銜使懷蘇子之抵掌憶千秋之畫地願自勵而飲水揆無庸而案轡嗟負恩之無力每若置于藂棘倏辭東平之樂善再踐承明而遊息豈羡千里之奔踶寧殊一錢之不直諒無期于鴻漸念有似于蟬翼荷德澤之霈然鑒丹愚之匪飾暫借譽于瑟柱免長徭于蔥極聊暇日以須臾每長吟以鬱紆異金石之能固若草木之分區進學慚于枝葉綿力謝于康衢搆伯休之蓬戶狎仲憲之桑樞徒悅水而非智庶因谷以為愚恥矯名于周客寧濫響于齊竽奉棲遲以偃仰願太素之不污初學記二十雲堂賦覽黃圖之棟宇規紫宸于太清何面勢之膠葛信不日之經營仰一時之壯麗跨萬古之威靈吐觸石之奇色混高堂之舊名若乃三階八戶百栱千楹瑩以玉琇飾以金英緑芰懸插紅蕖倒生于時木葉聲寒壺人唱靜承露擎虛相風昭迥天子乃下輦開宴出豫娛神文懸日月思革風塵實附鳳之多幸愧屠龍之不真藝文類聚六十三華貂賦并序領軍新安殿下以副貂垂錫仰銘恩澤謹題小賦貴豐貂于挹婁飾惠文而見求標侍臣之密設曜毛彩之溫柔拜文㮰而影度陪武帳而香浮隨玉珩之近遠共金璫之去留仰太山之千仞開谷中之鄙𠫤撤君子之寶飾榮小人之蓬鬢蔑置醴之殊私誇賜田之薄潤顧朽拙之微躬早遊藝而不工逢河閒之好古自隗始而恩隆諒維鵜之有愧庶懷昔而克終藝文類聚六十七山水納袍賦并序皇儲監國餘辰勞謙終宴有令以納袍降賜何以奉揚恩德因題此賦濫時來之寵沐振長纓以祗肅奉性與之文章侍相娛之絲竹解女羅之山帶佩流霞之羽服裁縫則萬壑縈體針縷則千巖映目圖島嶼之削成寫淪漣之徑復埒符彩于雕煥竝芬芳于蘭菊憫四選之徂遷軫百慮之回邅霜飛空而浸霧雁照月而猜弦聽風鐘之易近對水霤之疏懸若董衣之百結同衛服之十年嗟班鬢之已颯愧冶袖之為妍謝銜珠之有報荷墜履之無捐藝文類聚六十七瑪腦碗賦瑪腦碗賦翠羽流霞之杯諒無聞于瑋麗豈匹此之奇瓌爰覩殊特臻自西國狀驚鶴之點漬似遊龍之割刻士衡譬之雲采中郎羞其馬勒于時北園清夏東閣浮涼山交枝而影雜水沈葉而流香蟬無風而哂短鷺出迥而飛長副君海渟嶽峙紙落金鏘獲阿宗之美寶命河朔之名觴寶出崑崙之仙阜觴即元洲之玉酒酒既醉而還年碗稍酌而延壽仰天縱之體物銘欹器兮何有藝文類聚七十三南越木槿賦日及多名蕤賓肇生東方記乎夕死郭璞贊以朝榮潘文體其夏盛嵇賦憫其秋零此則京華之麗木非於越之舜英南中斬草衆花之寶雅什未名騷人失藻雨來翠潤露歇紅燥疊萼疑檠低莖若倒朝霞映日殊未妍珊瑚照水定非鮮千葉芙蓉詎相似百枝燈花復羞燃暫欲寄根對滄海大願移華廁綺錢井上桃蟲難可雜庭中桂蠹豈見憐乃為歌曰啼妝梁冀婦紅妝蕩子家若持花竝笑宜笑不勝花趙女垂金珥燕姬插寶珈誰知紅槿豔無因寄狹邪徒令萬里道攀折自咨嗟藝文類聚八十九舉士詔堯施諫鼓禹拜昌言求之異等久著前冊舉以滯淹復聞昔典斯乃治道之深規帝王之切務朕以寡昧丕承洪緒未明虛己日旰興懷萬機多紊四聰弗達思聞謇諤採其默語王公以下各薦所知傍詢管庫爰及輿皂一介有能片言可用朕親加聽覽佇茲啓沃藝文類聚五十三又見初學記二十陳書後主紀前冊作前徽默語作謀計佇茲作佇于為陳後主在東宮臨學聽講令令中庶子膠庠化本教學政前古之雍熙寧不由是自炎行將季風化陵遲梁室版蕩微言中廢後生莫曉洙泗之文晚學未聞齊魯之說加以棄本逐末情多詭競自衒守庸更如膠柱假詞而誦豈類背碑吾稟訓晨昏言詩立禮溫凊暇日秋籥冬書玩前聖之𥳑牘慕往賢之砥礪今鋒刃既銷雍序大啓刪浮去僞求名責實儒玄總集蒲玉交馳楨幹懿親開蒙範物梁園魯殿崇經弘道泮宮藩學未比宗師小山騷什寧同章句可謂千里更齊知十肅奉趍過預觀訓胄縫掖濟濟冠冕師師聽鉤深之說矚循環之辨美業再興于斯為盛昔遁棲下聘尚加束帛祥瑞上臻猶班重幣況茲大禮而可忽諸外即詳賜學僚以稱吾意文館詞林六百九十五為陳六宮謝章恭膺禮命愧集丹縷之顏拜奉曲私愁縈翬羽之色魯宮夜火伯媛匪驚楚榭奔濤貞姜何懼豈期日月騰影風雲寫潤遂復位崇九御聲高六列象服增華丹軿耀采何以弼佐王風克柔陰化兢惶竝集追想流荇之詩荷遽相并遂失鳴環之節藝文類聚十五初學記十為陳六宮謝表鶴籥晨啓雀叉曉映恭承盛典肅荷徽章步動雲桂香飄霧縠愧纏豔粉無情拂鏡愁縈巧黛息意臨窗妾聞漢水贈珠人閒絶世洛川拾翠仙處無雙或有風流行雨窈窕初日聲高一笑價起兩環乃可桂殿迎春蘭房侍寵借班姬之扇未掩驚羞假蔡琰之文寧披悚戴藝文類聚十五讓吏部尚書表竊以漢置五曹方今六尚魏隆八座擬古六卿近喻喉舌遠譬樞斗至如東京許郭西晉裴王仰首伸眉可得而論列矣但臣門基世緒晉宋以來內侍帷扆入尸衡尺或年甫將立或歲未強仕是以退思弱冠追傷疇昔早塵華任見知名輩常謂忝竊匪朝伊夕豈期梁室多故有志無時平生意氣颯爾零落特由邀奉嘉運千載一時惟奮寵靈遂臻于此藝文類聚四十八初學記十一為沈尚書君理讓右僕射領吏部表為沈尚書君理讓右僕射領吏部表辛香以來安石以後遵其軌躅必大廈之棟梁總其寄任亦巨川之舟楫未有綿力薄材輕膺此舉藝文類聚四十八讓尚書僕射表藻鏡官方品裁人物門驚如市不慚屋漏心抱如冰無欺暗室但屢淹星烏每知忝素世網拘束事歸僶勉今此召會尤增據蒺竊以端揆副職官稱師長革履升降傳呼寵赫儀刑朝首冠冕彝倫兼復參總衡流匡佐聖治妄膺重責必踐危機藝文類聚四十八初學記十一星烏作星鳥危機作棟撓讓尚書令表臣弱歲立朝本無奇志每謂任登常伯足承基緒值梁季不造牧拙人閒東竄三江南徂百越不知秦漢十有七年心迹退黜平生畢矣但野性疏懶不屑死增俯仰乖時人物多忤天飛踐祚任寄隆重謬以商丘之木遂比舟楫之材燕岱之石混同瑚璉之器當由崇賢使舉早守名節竊以天府文昌萬方之藪天官冡宰無所不統禮革三獨事昭百揆曠職云久三十餘載一旦開置必資望實豈期廷典私偏濫庸菲薄陛下聽覽餘辰曲垂昭納遂斯反汗高選具瞻則敝蓋敝帷使臣暮齒歲制月制賒臣皓髮不以一怠藝文類聚四十八為衡陽王讓吳郡表芝泥馳印發命開函潁之誠夏霜易霣兢惶之至春冰可涉臨輜回軾即事何取廣川無聲頗知自匹藝文類聚五十謝敕給鼓吹表略尋近古逖聽前事王文憲匡佐革命沈隱侯經綸始運騎吹之榮猶難忝冒以臣況此實非倫輩豈可更崇文物重假名器高臺迢遞未朱夏而登臨芳樹華滋非青春而奏曲藝文類聚六十八為太保蕭公謝儀同表為蕭太保謝儀同表阪泉野戰曾無汗馬之勞代邸運籌又闕前驅之勇薄伐專征早遊邊外執玉奉酎文虧朝則王人降止朝冊遠臨奉述敕書曲停表奏滄波阻敻既杜敬仲之辭關路悠長致絶趙衰之讓心馳紫路登文石而莫由目送白雲拜承明而未果藝文類聚四十七御覽二百四十三除詹事謝宮啓除詹事謝宮啓庇身修德濫迹端形陳蘿故葛攀附不涯解角蛻鱗超踰非次方辭璽會覬收渥澤藝文類聚四十九謝宮為製讓詹事表啓謝宮為製讓詹事表啓如攀珠樹徒仰照匣之輝若踐玉田不知照廡之價芙蓉之水亟奉北園迷迭之文屬陪南館久降噓枯之旨許賜淩雲之筆清夜宴斯謂言善戲黃金然諾竝遂殊寵年齊柏寢豈報恩榮紙罄蘭臺未書悚戴藝文類聚四十九除尚書令謝臺啓除尚書令謝臺啓竊以昔之冡司今日端揆頃同臺袞無人則闕臣之朽薄安可叨賁謹當奏承夜月冀奉三思之旨聲寄浮雲方祈九天之路藝文類聚四十八除尚書令斷表後啓司會治本冡宰朝端搢紳所屬儀刑攸在皇代以來無人則闕陛下將備厥職用穆臣僚不容始自庸菲以歡物議當今藩翰至戚不無其才廊廟重臣亦有其器伏願檢俞往之則闡平章之道臣公心布款有理存焉藝文類聚四十八初學記十一上毛龜啓臣聞聖王受命以代紹興日月精明之狀煙雲爛漫之采神鼎出于汾陰寶玉開于張掖靈山奧澤卉木呈祉靜海澄波鱗介禔福靡不顯符瑞以固鴻基肇徵祥以光永世者也影合四靈光分五色懷星拖月負宇銜圖藝文類聚九十九陶貞白先生集序昔劉向通古今之學馬融見天下之書京房察風雨之占襄楷曉陰陽之術子政傷于𥳑易季長敝于驕侈君明遂不旋踵公矩才免殛誅鮮有盡美之迹罕聞克終之譽若夫德行博敏孔室四科經術深長鄭門六藝丹陽陶先生備斯矣至如紫臺青𥳑緑帙丹經玉版祕文瑤壇怪牒靡不貫彼精微殫其旨趣蓋非常之絶伎命世之異人焉文集缺亡未有編録門人補輯若逢遼東之本好事研搜如誦河西之篋奉敕校之鉛墨緘以緹緗藏彼鴻都副在廷閣藝文類聚五十五入攝山棲霞寺詩序遊攝山棲霞寺詩序自敘歷升清顯備位朝列不邀世利不涉權幸嘗撫躬仰天太息曰莊青翟位至丞相無迹可紀趙元叔為上計吏光乎列傳官陳以來未嘗逢迎一物干預一事悠悠風塵流俗之士頗致怨憎榮枯寵辱不以介意太建之世權移群小諂嫉作威屢被摧黜奈何命也後主昔在東朝留意文藝夙荷昭晉恩紀契闊嗣位之日時寄謬隆儀形天府釐正庶績八法六典無所不統昔晉武帝策荀公曾曰周之冡宰今之尚書令也況復才未半古尸素若茲晉太尉陸玩云以我為三公知天下無人矣軒冕儻來之一物豈是預要乎弱歲歸心釋教年二十餘入鍾山就靈曜寺則法師受菩薩戒暮齒官陳與攝山布上人遊款深悟苦空更復練戒運善于心行慈于物頗知自勵而不能蔬菲尚染塵勞以此負愧平生耳陳書江總傳總嘗自敘其略云云時人謂之實録
