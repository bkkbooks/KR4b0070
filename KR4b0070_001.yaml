body:
  text: 卷一雉子斑麥壟新秋來澤雉屢徘徊依花似協妬拂草乍驚媒三春桃照李二月柳爭梅暫住如皋路當令巧笑開文苑英華二百六樂府詩集十八詩紀百四隴頭水二首隴頭萬里外天崖四面絶人將蓬共轉水與啼俱咽驚湍自湧沸古樹多摧折傳聞博望侯苦辛提漢節文苑英華百九十八樂府詩集二十一詩紀百四霧暗山中日風驚隴上秋徒傷幽咽響不見東西流無期從此別更度幾年幽遙聞玉關道望入杳悠悠同上折楊柳萬里音塵絶千條楊柳結不悟倡園花遙同羌嶺雪春心自浩蕩春樹聊攀折共此依依情無奈年年別文苑英華二百八樂府詩集二十二詩紀百四關山月兔月半輪明狐關一路平無期從此別復欲幾年行映光書漢奏分影照胡兵流落今如此長戍受降城樂府詩集二十三詩紀百四洛陽道二首德陽穿洛水伊闕邇河橋仙舟李膺棹小馬王戎鑣杏堂歌吹合槐路風塵饒緑珠含淚舞孫秀彊相邀文苑英華百九十二樂府詩集二十三詩紀百四小平路四達長楸聽五鐘玉節迎司隸錦車歸濯龍弦歌聲不息環珮響相從花障蕩舟笑日映下山逢同上長安道翠蓋承輕霧金羈照落暉五侯新拜罷七貴早朝歸轟轟紫陌上藹藹紅塵飛日暮延平客風花拂舞衣文苑英華百九十二樂府詩集二十三詩紀百四梅花落二首縹色動風香羅生枝已長妖姬墜馬髻未插江南璫轉袖花紛落春衣共有芳羞作秋胡婦獨採城南桑文苑英華二百八樂府詩集二十四詩紀百四胡地少春來三年驚落梅偏疑粉蝶散乍似雪花開可憐香氣歇可惜風相摧金鐃且莫韻玉笛幸徘徊同上紫騮馬春草正萋萋蕩婦出空閨識是東方騎猶帶北風嘶揚鞭向柳市細蹀上金堤願君憐織素殘妝尚有啼文苑英華二百九樂府詩集二十四詩紀百四驄馬驅長城兵氣寒飲馬詎為難暫解青絲轡行歇鏤衢鞍白登圍轉急黃河凍不乾萬里朝飛電論功易走丸文苑英華二百九樂府詩集二十四詩紀百四雨雪曲雨雪隔榆溪從軍度隴西繞陳看狐迹依山見馬蹄天寒旗彩壞地暗鼓聲低漫漫愁雲起蒼蒼別路迷文苑英華百九十三樂府詩集二十四詩紀百四劉生劉生負意氣長嘯且徘徊高論明秋水命賞陟春臺干戈倜儻用筆硯縱橫才置驛無年限遊俠四方來文苑英華百九十六樂府詩集二十四詩紀百四病婦行窈窕懷貞室風流挾琴婦唯將角枕臥自影啼妝久羞開翡翠帷懶對蒲萄酒深悲在縑素託意忘箕帚夫壻府中趨誰能大垂手樂府詩集三十八詩紀百四置酒高殿上三清傳旨酒柏梁奉歡宴霜雲動玉葉凍水疏金箭羽籥響鐘石流泉灌金殿盛時不再得光景馳如電類聚三十九作賦得置酒高殿上樂府詩集三十九詩紀百四今日樂相樂綺殿文雅遒玳筵歡趣密鄭態逶迤舞齊弦窈窕瑟金罍送縹觴玉井沈朱實願此北堂宴長奉南山日樂府詩集三十九詩紀百四簫史曲弄玉秦家女簫史仙處童來時兔月滿去後鳳樓空密笑開還斂浮聲咽更通相期紅粉色飛向紫煙中樂府詩集五十一詩紀百四詠燕燕于飛應詔詠燕燕于飛應詔二月春暉暉雙燕理毛衣銜花弄藿蘼拂葉隱芳菲或在堂間戲多從幕上飛若作仙人履終向日南歸類聚九十二作詠燕燕于飛應詔文苑英華二百六樂府詩集七十七詩紀百四濟黃河蔥山淪外域鹽澤隱遐方兩源分際遠九道派流長未殫所聞見無待驗詞章留連嗟太史惆悵踐黎陽導波縈地節疏氣耿天潢憫周沈用寶嘉晉肇為梁初學記六文苑英華百六十三並作渡黃河樂府詩集七十四詩紀百四橫吹曲簫聲鳳臺曲洞吹龍鍾管鏜鎝漁陽摻怨抑胡笳斷樂府詩集二十五詩紀百四怨詩二首採桑歸路河流深憶昔相期柏樹林奈許新縑傷妾意無由故劍動君心樂府詩集四十一詩紀百四新梅嫩柳未障羞情去恩移那可留團扇篋中言不分纖腰掌上詎勝愁同上烏棲曲桃花春水木蘭橈金羈翠蓋聚河橋隴西上計應行去城南美人啼著曙樂府詩集四十八詩紀百四芳樹朝霞映日殊未妍珊瑚照水定非鮮千葉芙蓉詎相似百枝燈花復羞然暫欲寄根對滄海大願移華側綺錢井上桃蟲誰可雜庭中桂蠹豈見憐古詩類苑百二十五詩紀百四東飛伯勞歌東飛伯勞歌南飛烏鵲北飛鴻弄玉蘭香時會同誰家可憐出窗牖春心百媚勝楊柳銀床金屋挂流蘇寶鏡玉叉橫珊瑚年時二八新紅臉宜笑宜歌羞更斂風花一去杳不歸秪為無雙惜舞衣文苑英華二百三樂府詩集六十八詩紀百四雜曲三首行行春徑蘼蕪緑織素那復解琴心乍愜南階悲緑草誰堪東陌怨黃金紅顏素月俱三五夫壻何在今追虜關山隴月春雪冰誰見人啼花照戶文苑英華二百十一樂府詩集七十七詩紀百四殿內一處起金房併勝餘人白玉堂珊瑚挂鏡臨網戶芙蓉作帳照雕梁房櫳宛轉垂翠幕佳麗逶迤隱珠箔風前花管揚難留舞處花鈿低不落陽臺通夢太非真洛浦凌波復不新曲中唯聞張女調定有同姓可憐人但願私情賜斜領不願傍人相比並妾門逢春自可榮君面未秋何意冷樂府詩集七十七詩紀百四泰山言應可轉移新寵不信更參差合歡錦帶鴛鴦鳥同心綺袖連理枝皎皎新秋明月開早露飛螢暗裏來鯨燈落花殊未盡虬水銀箭莫相催非是神女期河漢別有仙姬入吹臺未眠解著同心結欲醉那堪連理杯後宮不愜茱萸芳夜夜爭開蘇合房寶叉翠鬢還相似朱脣玉面非一行新人未語言如澀新寵無前判不臧願奉更衣蘭麝氣恐君馬到自驚香同上梅花落臘月正月早驚春衆花未發梅花新可憐芬芳臨玉臺朝攀晚折還復開長安少年多輕薄兩兩共唱梅花落滿酌金巵催玉柱落梅樹下宜歌舞金谷萬株連綺甍梅花密處藏嬌鶯桃李佳人欲相照摘葉牽花來並笑楊柳條青樓上輕梅花色白雪中明橫笛短簫淒復切誰知柏梁聲不絶徐孝穆集一文苑英華二百八作徐陵樂府詩集二十四詩紀百四又類聚八十六引春新臺開柱舞甍鶯照笑輕明咽絶十四韻宛轉歌七夕天河白露明八月濤水秋風驚樓中恆聞哀響曲塘上復有辛苦行不解何意悲秋氣直置無秋悲自生不怨前階促織鳴偏愁別路搗衣聲別燕差池自有返離蟬寂寞詎含情雲聚懷情四望臺月冷相思九重觀欲題芍藥詩不成來採芙蓉花已散金樽送曲韓娥起玉柱調弦楚妃歎翠眉結恨不復開寶鬢迎秋度前亂湘妃拭淚灑貞筠策藥浣衣何處人步步香飛金薄履盈盈扇掩珊瑚脣已言採桑期陌上復能解佩就江濱競入華堂要花枕爭開羽帳奉華茵不惜獨眠前下釣欲許便作後來薪後來暝暝同玉床可憐顏色無比方誰能巧笑特窺井乍取新聲學繞梁宿處留嬌墮黃珥鏡前含笑弄明璫菤葹摘心心不盡茱萸折葉葉更芳已聞能歌洞簫賦詎是故愛邯鄲倡徐孝穆集一文苑英華二百七作徐陵樂府詩集六十詩紀百四長相思二首長相思久離別征夫去遠芳音滅湘水深隴頭咽紅羅斗帳裏緑綺清弦絶逶迤百尺樓愁思三秋結文苑英華二百二樂府詩集六十九詩紀百四長相思久別離春風送燕入簷窺暗開脂粉弄花枝紅樓千愁色玉筯兩行垂心心不相照望望何由知同上秋日侍宴婁苑湖應詔翠渚還鑾輅瑤池命羽觴千門響雲蹕四澤動榮光玉軸昆池浪金舟太液張虹旗照島嶼鳳蓋繞林塘野靜重陰闊淮秋水氣涼霧開樓闕近日迥煙波長洛宴諒斯在鎬飲詎能方朽劣叨榮遇簪笏奉周行初學記十四文苑英華百六十九詩紀百五侍宴玄武觀詰曉三春暮新雨百花朝星宮移渡罕天駟動行鑣斾轉蒼龍闕塵飛飲馬橋翠觀迎斜照丹樓望落潮鳥聲雲裏出樹影浪中搖歌吟奉天詠未必待聞韶類聚六十三文苑英華百六十九詩紀百五宴樂修堂應令肅城通甲觀承華啓畫堂北宮降恩賞西園度羽觴殊私奉玉裕終宴在金房庭暉連樹彩簷影接雲光仙如伊水駕樂似洞庭張彈絲命琴瑟吹竹動笙簧庸疏濫應阮衰朽恧連章初學記十文苑英華百七十九詩紀百五三日侍宴宣猷堂曲水上巳娛春褉芳辰喜月離北宮命簫鼓南館列旌麾繡柱擎飛閣雕軒傍曲池醉魚沈遠岫浮藻漾清漪落花懸度影飛絲不礙枝樹動丹樓出山斜翠磴危禮周羽爵遍樂闋光陰移古今歲時雜詠十六初學記四文苑英華百七十二詩紀百四秋日遊昆明池秋日遊昆明池靈沼蕭條望遊人意緒多終南雲影落渭北雨聲過蟬噪金堤柳鷺飲石鯨波珠來照似月織處寫成河此時臨水歎非復採蓮歌類聚九初學記七文苑英華百六十四詩紀百四秋日登廣州城南樓秋城韻晚笛危榭引清風遠氣疑埋劍驚禽似避弓海樹一邊出山雲四面通野火初煙細新月半輪空塞外離群客顏鬢早如蓬徒懷建鄴水復想洛陽宮不及孤飛鴈獨在上林中類聚二十八文苑英華三百十一詩紀百五贈洗馬袁朗別賈誼登朝日終軍對奏年校文升廣內撫劍入崇賢奇才殊豔逸將別更留連驅車命鐃管拱坐面林泉池寒稍下鴈木落久無蟬露浸山扉月霜開石路煙高談無與慰遲爾報華篇類聚二十九文苑英華二百六十六作贈別洗馬袁朗詩紀百五詒孔中丞奐詒孔中丞奐我行五嶺表辭鄉二十年聞鶯欲動詠披霧即依然疇昔同寮寀今隨年代改借問藏書處唯君故人在故人名宦高霜簡肅權豪誰知懷九歎徒然泣二毛步出東郊望心游江海上遇物便今古何為不惆悵初晴原野開宿雨潤條枚叢花曙後發一鳥霧中來淹留蘭蕙苑吟嘯芳菲晚忘懷靜躁間自覺風塵遠白社聊可依青山乍採薇鍾牙乃得性語默豈同歸文苑英華二百四十七詩紀百五又初學記十二引年然寀在高毫毛八韻御覽二百二十六作孔中丞詩引年然寀在高毫毛八韻贈賀左丞蕭舍人輶軒通八表旌節騖三秦聽歌酬敏對繼好佇行人賀生思沈鬱蕭弟學紛綸共有筆端譽皆為席上珍離群徒悄悄征旅日侁侁黃河分太史一曲悲千里海內平生親中朝流寓士痛哉憫梁祚于焉三十祀鍾儀縶不歸盛憲悲何已隴頭心斷絶爾為參生死回首望長安猶如蜀道難函關分地軸華嶽接天壇行旜方境逝去棹艤江干蘆花霜外白楓葉水前丹翔鷗方怯凍落鴈不勝彈輝輝盛王道時務嬰疲老九流倦耳目十年變懷抱何以敦歧路淒然綴辭藻江南有桂枝塞北無萱草斗酒未為別垂堂深自保文苑英華二百四十七詩紀百四遇長安使寄裴尚書傳聞合浦葉遠向洛陽飛北風尚嘶馬南冠獨不歸去雲目徒送離琴手自揮秋蓬失處所春草屢芳菲太息關山月風塵客子衣類聚三十一文苑英華二百四十七詩紀百五別南海賓化侯石關通越井蒲澗邇靈洲此地何遼敻群英逐遠遊高才袁彥伯令譽許文休悠焉值君子復此映芳猷崤函多險澀星琯壯環周分歧泣世道念別傷邊秋斷山時結霧平海若無流驚鷺一群起哀猿數處愁是日送歸客為情自可求終謝能鳴鴈還同不繫舟其如江海泣惆悵徒離憂文苑英華二百六十六詩紀百五又類聚二十九作別賓化侯詩引秋流愁求四韻庚寅年二月十二日遊虎丘山精舍縱棹憐回曲尋山靜見聞每從芳杜性須與俗人分貝塔涵流動花臺偏領芬蒙蘢出簷桂散漫繞窗雲情幽豈狥物志遠易驚群何由狎魚鳥不願屈玄纁廣弘明集三十詩紀百五入龍丘巖精舍法堂猶集鴈仙竹幾成龍聊承丹桂馥遠視白雲峰風窗穿石竇月牖拂霜松暗谷留征鳥空林徹夜鐘陰崖未辨色疊樹豈知重溘此哀時命吁嗟世不容無由訪詹尹何去復何從文苑英華二百三十三詩紀百五明慶寺十五詩書日六十軒冕年名山極歷覽勝地殊留連幽崖聳絶壁洞穴瀉飛泉金河知證果石室乃安禪夜梵聞三界朝香徹九天山階步皎月澗戶聽涼蟬市朝霑草露淮海作桑田何言望鍾嶺更復切秦川初學記二十三文苑英華二百三十三詩紀百五入攝山棲霞寺并序壬寅年十月十八日入攝山棲霞寺登岸極峭頗暢懷抱至德元年癸卯十月二十六日又再遊此寺布法師施菩薩戒甲辰年十月二十五日奉送金像還山限以時務不得恣情淹留乙巳年十一月十六日更獲拜禮仍停山中宿永夜留連棲神悚聽但交臂不停薪指俄謝率製此篇以記即目俾後來賞者知余山志淨心抱冰雪暮齒逼桑榆太息波川迅悲哉人世拘歲華皆採穫冬晚共嚴枯濯流濟八水開襟入四衢茲山靈妙合當與天地俱石瀨乍深淺崖煙遞有無缺碑橫古隧盤木臥荒塗行行備履歷步步轔威紆高僧迹共遠勝地心相符樵隱各有得丹青獨不渝遺風佇芳桂比德喻生芻寄言長往客悽然傷鄙夫廣弘明集三十文苑英華二百三十三作再遊栖霞寺言志詩紀百五遊攝山棲霞寺并序禎明元年太歲丁未四月十九日癸亥入攝山展慧布法師憶謝靈運集還故山入石壁中尋曇隆道人有詩一首十一韻今此拙作仍學康樂之體霡霂時雨霽清和孟夏肇棲宿緑野中登頓丹霞杪敬仰高人德抗志塵物表三空豁已悟萬有一何小始從情所寄冥期諒不少荷衣步林泉麥氣涼昏曉乘風面泠泠候月臨皎皎煙崖憩古石雲路排征鳥披徑憐森沈攀條惜杳裊平生忘是非朽謝豈矜矯五淨自此涉六塵庶無擾廣弘明集三十文苑英華二百三十三作遊栖霞寺新雨又新雨下注云集作時雨詩紀百五攝山棲霞寺山房夜坐簡徐祭酒周尚書并同遊群彥攝山棲霞寺山房夜坐簡徐祭酒周尚書并同遊群彥澡身事珠戒非是學金丹月磴時橫枕雲崖宿解鞍梵宇調心易禪庭數息難石澗水流靜山窗葉去寒君思北闕駕我惜東都冠翻愁夜鐘盡同志不盤桓廣弘明集三十文苑英華二百三十三詩紀百五靜臥棲霞寺房望徐祭酒絶俗俗無侶修心心自齊連崖夕氣合虛宇宿雲霾臥藤新接戶欹石久成階樹聲非有意禽戲似忘懷故人市朝狎心期林壑乖唯憐對芳杜可以為吾儕廣弘明集三十詩紀百五營涅槃懺還塗作并序禎明二年仲冬攝山棲霞寺布法師只爾待終余以此月十七日宿昔入山仰為師氏營涅槃懺還途有此作可否同一貫生死亦一條況斯滅盡者豈是俗中要人道離群愴冥期出世遙留連入澗曲宿昔陟巖椒石溜冰便斷松霜日自銷向崖雲靉靆出谷霧飄颻勿言無大隱歸來即市朝廣弘明集三十詩紀百五至德二年十一月十二日升德施山齊三宿決定罪福懺悔詩至德二年十一月十二日升德施山齊三宿決定罪福懺悔詩四知無矯志二施啓幽心簡通避人物偃息還山林曲澗停騶響交枝落幔陰池臺聚凍雪欄牖噪歸禽石彩無新故峰形詎古今大車何杳杳奔馬遂駸駸何以修六念虔誠在一音未泛慈舟遠徒令願海深廣弘明集三十詩紀百五詠採甘露應詔祥露曉氛氳上林朝晃朗千行珠樹出萬葉瓊枝長徐輪動仙駕清晏留神賞丹水波濤泛黃山煙霧上風亭翠斾開雲殿朱絃響徒知恩禮洽自憐名實爽初學記二詩紀百五借劉太常說文借劉太常說文劉棻慕子雲許慎詢景伯碩學該蟲篆奇文秀鳥跡曰余徒下帷待問垂重席不詣王充市聊投班玩籍三寫遍鑽研六書多補益幽居服藥餌山宇生虛白留連嗣芳杜曠蕩依泉石夫君愛滿堂願言馳下澤初學記二十一詩紀百五賦得一日成三賦應令副君睿賞遒清夜北園遊下筆成三賦傳觴對九秋飛文綺縠采落紙波濤流樹密寒蟬響簷暗雀聲愁緑漵明層殿青山照近樓此時盛禮物顧省良若抽初學記二十一詩紀百五攝官梁小廟疇昔遊依所今日薦櫻時憲章誠有革歲月遂難思故人獨之子官聯更在茲虛簷靜暮雀洞戶映光絲平生復能幾語事必傷悲類聚三十八文苑英華三百二十詩紀百五卞山楚廟蘋藻祈明德倚棹息岩阿忽聽晨雞曙非復楚宮歌閒階剃宿薺古木斷懸蘿帷堂寂易晚桴鼓自相和盛祀流百世英威定幾何類聚三十八文苑英華三百二十詩紀百五山庭春日洗沐惟五日棲遲在一丘古楂橫近澗危石聳前洲岸緑開河柳池紅照海榴野花寧待晦山蟲詎識秋人生復能幾夜燭非長游類聚三作山庭春詩初學記二十作休沐山庭詩文苑英華百五十七詩紀百五七夕漢曲天榆冷河邊月桂秋婉孌期今夕飄颻渡淺流輪隨列宿動路逐彩雲浮橫波翻瀉淚束素反緘愁此時機杼息獨向紅粧羞類聚四初學記四古今歲時雜詠二十五文苑英華百五十八詩紀百五南還尋草市宅紅顏辭鞏洛白首入轘轅乘春行故里徐步采芳蓀徑毀悲求仲林殘憶巨源見桐猶識井看柳尚知門花落空難遍鶯啼靜易喧無人訪語默何處敘寒溫百年獨如此傷心豈復論類聚六十四初學記二十四文苑英華三百七詩紀百五和張記室源傷往小婦當壚夜夫壻凱歸年正歌千里曲翻入九重泉機中未斷素瑟上本留弦空帳臨窗掩孤燈向壁然還悲寒隴曙松短未生煙類聚三十四作和張源傷往詩文苑英華三百二題下注集作傷佳人詩紀百五在陳旦解酲共哭顧舍人獨酌一樽酒高詠七哀詩何言蒿里別非復竹林期階荒鄭公草戶闃董生帷人隨暮槿落客共晚鶯悲年髮兩如此傷心詎幾時類聚三十四作傷顧野王詩文苑英華三百二詩紀百五侍宴臨芳殿鍾箭自徘徊皇堂薦羽杯橋平疑水落石迥見山開林前暝色靜花處近香來西嵫傷撫夕北閣濫游陪初學記二十四文苑英華百七十五作臨芳殿侍宴萬花谷後二十三作江總詩詩紀百五侍宴瑤泉殿水亭通枍詣石路接堂皇野花不識采旅竹本無行雀驚疑欲曙蟬噪似含涼何言金殿側亟奉瑤池觴初學記二十四文苑英華百七十五作宴瓊泉殿詩紀百五別袁昌州二首河梁望隴頭分手路悠悠徂年若驚電別日欲成秋黃鵠飛飛遠青山去去愁不言雲雨散更似東西流類聚二十九初學記十八文苑英華二百六十六詩紀百五客子歎途窮此別異西東關山嗟墜葉歧路憫征蓬別鶴聲聲遠愁雲處處同類聚二十九經始興廣果寺題愷法師山房息舟候香埠悵別在寒林竹近交枝亂山長絶徑深輕飛入定影落照有疏陰不見投雲狀空留折桂心初學記二十三詩紀百五和衡陽殿下高樓看妓起樓侵碧漢初日照紅粧弦心豔卓女曲誤動周郎並歌時轉黛息舞暫分香挂纓銀燭下莫笑玉叉長初學記十五文苑英華二百十三詩紀百五賦得空閨怨蕩妻怨獨守盧姬傷獨居瑟上調弦落機中織素餘自羞淚無燥翻覺夢成虛復嗟長信閣寂寂往來疏類聚三十二詩紀百五并州羊腸坂三春別帝鄉五月度羊腸本畏車輪折翻嗟馬骨傷驚風起朔鴈落照盡胡桑關山定何許徒御慘悲涼文苑英華二百八十九歲暮還宅悒然想泉石驅駕出城臺玩竹春前筍驚花雪後梅青山殊可對黃卷復時開長繩豈繫日濁酒傾一杯類聚六十四初學記二十四詩紀百五春夜山庭春夜芳時晚幽庭野氣深山疑刻削意樹接縱橫陰戶對忘憂草池驚旅浴禽樽中良得性物外知余心類聚三十六廣文選十五詩紀百五夏日還山庭獨於幽棲地山庭暗女蘿澗漬長低篠池開半卷荷野花朝暝落盤根歲月多停樽無賞慰狎鳥自經過類聚三十六詩紀百五賦得謁帝承明廬霧開仁壽殿雲繞承明廬輪停紺幰引馬度紅塵餘香貂拜黻袞花綬拂玄除謁帝升清漢何殊入紫虛初學記十四文苑英華百九十詩紀百五賦得攜手上河梁應詔早秋天氣涼分手關山長雲愁數處黑木落幾枝黃鳥歸猶識路流去不知鄉秦川心斷絶何悟是河梁類聚二十九詩紀百五賦得泛泛水中鳧歸鳧沸卉同亂下芳塘中出沒時銜藻飛鳴忽揚風浮深或不息戲廣若乘空春鸚徒有賦還笑在金籠類聚九十一文苑英華三百二十九詩紀百五賦得三五明月滿賦得三五明月滿三五兔輝成浮陰冷復輕隻輪非戰反團扇少歌聲雲前來往色水上動搖明況復高樓照何嗟攬不盈類聚一文苑英華百五十二詩紀百五衡州九日秋日正淒淒茅茨復蕭瑟姬人薦初醞幼子問殘疾園菊抱黃華庭榴剖珠實聊以著書情暫遣他鄉日初學記四古今歲時雜詠三十三文苑英華百五十八御覽三十二詩紀百五賦詠得琴可憐嶧陽木雕為緑綺琴田文垂睫淚卓女弄弦心戲鶴聞應舞游魚聽不沈楚妃幸勿歎此異丘中吟類聚四十四初學記十六作賦得詠琴詩文苑英華二百十二作賦得詠琴詩紀百五詠雙闕象闕連馳道天宇照方疏刻鳳棲清漢圖龍入紫虛屢逢膏露灑幾遇祥煙初競言百尺麗寧方萬丈餘類聚六十二詩紀百五三善殿夜望山燈百花疑吐夜四照似含春的的連星出亭亭向月新採珠非合浦贈珮異江濱若在扶桑路堪言並日輪初學記二十五萬花谷續八作江總詩詩紀百五奉和東宮經故妃舊殿奉和東宮經故妃舊殿故殿看看冷空階步步悲猶憶窺窗處還如解佩時苔生無意早燕入有言遲若令歸就月照見不須疑類聚三十四文苑英華三百七詩紀百五同庾信答林法師同庾信答林法師客行七十歲歲暮遠徂征塞雲凝不解隴水凍無聲君看日遠近為忖長安城類聚二十九作周弘正初學記十八詩紀百五詠李嘉樹春風早春風花落新但見成蹊處幾得正冠人當知露井側復與夭桃鄰類聚八十六詩紀百五詠蟬白露涼風吹朱明落照移鳴條噪林柳流響遍臺池忖聲如易得尋忽卻難知類聚九十七詩紀百五答王筠早朝守建陽門開答王筠早朝守建陽門開金兔猶懸魄銅龍欲啓扉三條息行火百雉照初暉御溝槐影出仙掌露光晞類聚三十九文苑英華百九十詩紀百五侍宴賦得起坐彈鳴琴絲傳園客意曲奏楚妃情罕有知音者空勞流水聲初學記十六萬花谷後三十二作江總詩詩紀百五別永新侯送君張掖郡分悲函谷關欲知腸斷絶浮雲去不還類聚二十九詩紀百五春日春日水苔宜溜色山櫻助落暉浴鳥沈還戲飄花度不歸初學記三詩紀百五於長安歸還揚州九月九日行薇山亭賦韻於長安歸還揚州九月九日行薇山亭賦韻心逐南雲逝形隨北鴈來故鄉籬下菊今日幾花開初學記四作九月九日至微山亭詩御覽三十二作九日至微山亭詩詩紀百五哭魯廣達黃泉雖抱恨白日自留名悲君感義死不作負恩生陳書魯廣達傳南史魯廣達傳詩紀百五秋日新寵美人應令後宮唯聞莫瓊樹絶世復有宋容華皆自爭名進女弟定覺雙飛勝蕩家願並迎春比翼燕常作照日同心花聞道豔歌時易調忖許新恩那久要翠眉未畫自生愁玉臉含啼還似笑角枕千嬌薦芬香若使琴心一曲奏幽蘭度曲不可終陽臺夢裏自應通秋樹相思一枝緑為插賤妾兩鬟中類聚十八詩紀百五新入姬人應令洛浦流風漾淇水秦樓初日度陽臺玉軼輕輪五香散金燈夜火百花開非是妖姬渡江日定言神女隔河來來時向月別姮娥別時清吹悲簫史數錢拾翠爭佳麗拂紅點黛何相似本持纖腰惑楚宮暫回舞袖驚吳市新人羽帳挂流蘇故人網戶織蜘蛛梅花柳色春難遍情來春去在須臾不用庭中賦緑草但願思著弄明珠類聚十八詩紀百五閨怨篇寂寂青樓大道邊紛紛白雪綺窗前池上鴛鴦不獨自帳中蘇合還空然屏風有意障明月燈火無情照獨眠遼西水凍春應少薊北鴻來路幾千願君關山及早度念妾桃李片時妍類聚三十二作閨怨詩文苑英華三百四十六詩紀百五又蜘蛛作絲滿帳中芳草結葉當行路紅臉脈脈一生啼黃鳥飛飛有時度故人雖故昔經新新人雖新復應故玉臺新詠九作梁簡文帝和蕭侍中子顯春別類聚三十二詩紀百五內殿賦新詩兔影脈脈照金鋪虬水滴滴瀉玉壺綺翼雕甍邇清漢虹梁紫柱麗黃圖風高暗緑凋殘柳雨駛芳紅濕晚芙三五二八佳年少百萬千金買歌笑偏著故人織素詩願奏秦聲采蓮調織女今夕渡銀河當見新秋停玉梭樂府詩集七十四詩紀百五姬人怨姬人怨天寒海水慣相知空床明月不相宜庭中芳桂憔悴葉井上疏桐零落枝寒燈作花羞夜短霜鴈多情恆結伴非為隴水望秦川直置思君腸自斷類聚三十二作為姬人怨服散詩文苑英華三百四十六詩紀百五姬人怨服散篇薄命夫壻好神仙逆愁高飛向紫煙金丹欲成猶百鍊玉酒新熟幾千年妾家邯鄲好輕薄特忿仙童一丸藥自悲行處緑苔生何悟啼多紅粉落莫輕小婦狎春風羅襪也得步河宮雲車欲駕應相待羽衣未去幸須同不學簫史還樓上會逐姮娥戲月中類聚三十二接上篇為一首文苑英華三百四十六詩紀百五
